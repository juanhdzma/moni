name: Build & push to GHCR

on:
  push:
    branches: [main]
    paths:
      - index.html
      - Dockerfile
      - css/**
      - js/**
      - backend/**

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/fondo-familiar

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
